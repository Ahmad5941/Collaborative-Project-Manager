<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collab Project Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Collaborative Project Manager</h1>
    <p>Create, assign, track and manage team tasks</p>
    <nav class="header-actions" aria-label="Application views">
      <button class="view-button active" data-view="createView" type="button">Create Task</button>
      <button class="view-button" data-view="reviewView" type="button">Review Tasks</button>
      <button class="view-button" data-view="notificationView" type="button">
        Notifications <span id="notificationCount" class="notification-count" hidden>0</span>
      </button>
    </nav>
  </header>

  <main class="container">

    <div id="createView" class="page-view">
    <section class="card">
      <h2>Create / Update Task</h2>

      <form id="taskForm">
        <input type="hidden" id="taskId" />

        <input type="text" id="taskName" placeholder="Task Name" required />

        <textarea id="taskDescription" placeholder="Task Description" required></textarea>

        <select id="assignedUser" aria-label="Assign User" required>
          <option value="">Assign User</option>
        </select>

        <input type="date" id="dueDate" aria-label="Due Date" required />

        <select id="status" aria-label="Task Status">
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>

        <select id="priority" aria-label="Task Priority">
          <option value="High">High Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="Low">Low Priority</option>
        </select>

        <button type="submit">Save Task</button>
      </form>
    </section>
    </div>

    <div id="reviewView" class="page-view" hidden>
    <section class="card">
      <h2>Controls</h2>

      <div class="controls">
        <select id="filterStatus" aria-label="Filter Tasks by Status">
          <option value="All">All Tasks</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>

        <button onclick="sortByPriority()">Sort by Priority</button>
        <button onclick="generateReport()">Generate Report</button>
      </div>
    </section>

    <section class="card">
      <h2>Task List</h2>
      <div id="taskList"></div>
      <div id="taskNavigation" class="task-navigation" hidden>
        <button id="previousTask" type="button">Previous</button>
        <span id="taskCounter" aria-live="polite"></span>
        <button id="nextTask" type="button">Next</button>
      </div>
    </section>

    <section class="card">
      <h2>Project Report</h2>
      <div id="reportBox">
        <p>No report generated yet.</p>
      </div>
    </section>
    </div>

    <div id="notificationView" class="page-view" hidden>
    <section class="card">
      <h2>Real-Time Notifications</h2>
      <ul id="notificationList"></ul>
    </section>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
